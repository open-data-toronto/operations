      attributes: 
        - id: vehid
          type: text
          info:
            notes: Unique vehicle identifier to which the summarized operating metrics pertain
        - id: hr
          type: text
          info:
            notes: Date and hour to which the operating metrics pertain
        - id: reported_trips_started
          type: text
          info:
            notes: Count of completed trips as reported by PTCs that started in the specified hour
        - id: reported_trip_fractions
          type: text
          info:
            notes: Count of completed trips and portions of completed trips that occurred during the specified hour
        - id: pooled_trips_started
          type: text
          info:
            notes: Count of pooled trips as reported by PTCs that started in the specified hour
        - id: pooled_trip_fractions
          type: text
          info:
            notes: Count of pooled trips and portions of pooled trips that occurred during the specified hour
        - id: routed_trips_started
          type: text
          info:
            notes: Count of all trips that were routed through City's routing processes that started in the specified hour
        - id: driver_cancelled_trips
          type: text
          info:
            notes: Count of trips cancelled by the driver, based on the hour the trip was requested
        - id: passenger_cancelled_trips
          type: text
          info:
            notes: Count of trips cancelled by the passenger, based on the hour the trip was requested
        - id: toronto_boundary_crossed
          type: text
          info:
            notes: A value of `true` indicates that the vehicle crossed Toronto's boundary during the specified hour
        - id: fares
          type: text
          info:
            notes: Fares collected in Canadian dollars during the specified hour
        - id: time_available
          type: text
          info:
            notes: Minutes the vehicle spent available and not carrying customers during the specified hour, whether inside or outside the City of Toronto
        - id: time_enroute
          type: text
          info:
            notes: Minutes the vehicle spent en route to a passenger pick-up point during the specified hour, whether inside or outside the City of Toronto
        - id: time_waiting
          type: text
          info:
            notes: Minutes the vehicle spent waiting for a passenger at the pick-up point during the specified hour, whether inside or outside the City of Toronto
        - id: time_ontrip
          type: text
          info:
            notes: Minutes the vehicle spent on trip during the specified hour, whether inside our outside the City of Toronto
        - id: dist_available_routed
          type: text
          info:
            notes: Routed kilometres the vehicle travelled while available and not carrying customers within the City of Toronto during the specified hour
        - id: dist_enroute_routed
          type: text
          info:
            notes: Routed kilometres the vehicle travelled within the City of Toronto en route to the passenger pick-up point during the specified hour
        - id: dist_ontrip_routed
          type: text
          info:
            notes: Routed kilometres the vehicle travelled within the City of Toronto on a trip during the specified hour
        - id: dist_ontrip_reported
          type: text
          info:
            notes: Kilometres the vehicle travelled while on trip during the specified hour as reported by PTCs
        