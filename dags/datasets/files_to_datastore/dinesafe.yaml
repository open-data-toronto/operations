  resources:
    # resource name
    Dinesafe:
      format: json
      url: https://secure.toronto.ca/opendata/ds_od/inpections/v2?format=json
      custom_reader: dinesafe
      datastore_upsert:
        primary_key: "unique_id"
      attributes:
        - id: unique_id
          type: text
          info:
            notes: "Unique id for this record connected to source data"
        - id: estId
          type: text
          info:
            notes: "Establishment ID"
        - id: estName
          type: text
          info:
            notes: "Establishment Name"
        - id: address
          type: text
          info:
            notes: "Address of Establishment"
        - id: inspectionStatus
          type: text
          info:
            notes: "Status of the inspection (ex: Pass)"
        - id: inspectionDate
          type: date
          format: "%Y-%m-%d"
          info:
            notes: "Date of inspection"
        - id: typeDesc
          type: text
          info:
            notes: "Category of infraction"
        - id: deficiencyDesc
          type: text
          info:
            notes: "Description of infraction deficiency"
        - id: actionDesc
          type: text
          info:
            notes: "Description of action taken"
        - id: OutcomeDate
          type: date
          format: "%Y-%m-%d"
          info:
            notes: "Date of outcome"
        - id: OutcomeDesc
          type: text
          info:
            notes: "Description of outcome"
        - id: amountFined
          type: float
          info:
            notes: "Dollar amount of fine given"
        - id: latitude
          type: text
          info:
            notes: ""
        - id: longitude
          type: text
          info:
            notes: ""