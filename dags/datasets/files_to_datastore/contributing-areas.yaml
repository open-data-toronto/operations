  excerpt: Contributing Areas are illustrated on Map 9A and described in a sidebar in chapter 3.4 of the Official Plan. These are areas where efforts should be made to protect and enhance ecological function and biodiversity. 
  limitations: This information is provided for illustrative purposes only.
  collection_method: Contributing areas are identified using field research and modelling, and will continue to be refined in consultation with the TRCA. 
  notes:  Contributing Areas are illustrated on Map 9A and described in a sidebar in chapter 3.4 of the [Official Plan](https://www.toronto.ca/city-government/planning-development/official-plan-guidelines/official-plan/). Contributing Areas are not part of the natural heritage system. Contributing areas support Toronto’s ecosystems and natural heritage features and functions. They provide opportunities for habitat connectivity and natural linkages across the city; they include habitat areas that are highly suitable for birds; and/or they contribute to groundwater systems that support sensitive areas like wetlands and cold water streams. These are areas where efforts should be made to protect and enhance ecological function and biodiversity by maintaining and enhancing existing tree canopy and soft landscaping, and encouraging other green infrastructure measures. 
