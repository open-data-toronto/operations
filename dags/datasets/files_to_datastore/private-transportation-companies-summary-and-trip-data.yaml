          info:
            notes: Count of non-wheelchair accessible vehicle trips cancelled by the driver that were requested on the specified date
        - id: trips_cancelled_passenger_wav
          type: float
          info:
            notes: Count of wheelchair accessible vehicle trips cancelled by the passenger that were requested on the specified date
        - id: trips_cancelled_passenger_nonwav
          type: float
          info:
            notes: Count of non-wheelchair accessible vehicle trips cancelled by the passenger that were requested on the specified date
        - id: dist_avg
          type: float
