            notes: Average distance per trip in kilometres
        - id: fare_avg
          type: float
          info:
            notes: Average fare per trip in Canadian dollars
        - id: waittime_wav_avg
          type: float
          info:
            notes: Average wait time for completed WAV trips in minutes
        - id: waittime_nonwav_avg
          type: float
          info:
