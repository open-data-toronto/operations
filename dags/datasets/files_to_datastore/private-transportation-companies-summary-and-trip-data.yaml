        - id: dist_enroute_routed
          type: float
          info:
            notes: Routed kilometres vehicles travelled within the City of Toronto en route to the passenger pick-up point
        - id: dist_ontrip_routed
          type: float
          info:
            notes: Routed kilometres vehicles travelled within the City of Toronto while completing trips
        - id: dist_ontrip_reported
          type: float
          info:
            notes: Kilometres vehicles travelled while on trips as reported by PTCs
        - id: percent_time_available
          type: float
          info:
            notes: Percent of time spent available and not engaged with a passenger, whether inside or outside the City of Toronto
        - id: percent_time_enroute
          type: float
          info:
            notes: Percent of time spent en route to the passenger pick-up point, whether inside or outside the City of Toronto
        - id: percent_time_waiting
          type: float
          info:
            notes: Percent of time spent waiting for the passenger at the pick-up point, whether inside or outside the City of Toronto
        - id: percent_time_ontrip
          type: float
          info:
            notes: Percent of time spent on trips, whether inside or outside the City of Toronto
        - id: percent_dist_available_routed
          type: float
          info:
            notes: Percent of routed distance travelled while available and not carrying passengers within the City of Toronto
        - id: percent_dist_enroute_routed
          type: float
          info:
            notes: Percent of routed distance travelled while en route to the passenger pick-up point within the City of Toronto
        - id: percent_dist_ontrip_routed
          type: float
          info:
            notes: Percent of routed distance travelled while on trips within the City of Toronto
        
