# package name
library-branch-programs-and-events-feed:
  # DAG info
  schedule: "0 20 * * *"
  dag_owner_name: Yanan
  dag_owner_email: yanan.zhang@toronto.ca

  # mandatory package attributes
  title: Library Branch Programs and Events Feed
  date_published: "2023-06-20T00:00:00.000000"
  refresh_rate: Daily
  dataset_category: Table

  # optional package attributes
  owner_division: Toronto Public Library
  owner_section: null
  owner_unit: null
  owner_email: planning@tpl.ca

  civic_issues: null
  topics: 
    - Community services
  tags:
  - name: library
    vocabulary_id: null
  - name: tpl
    vocabulary_id: null
  information_url: https://www.torontopubliclibrary.ca/opendata/
  excerpt: JSON data providing details on upcoming programs and events offered at Toronto Public Library branches. 
  limitations: null   
  notes: JSON data providing details on upcoming programs and events offered at Toronto Public Library branches. It includes a description of the events, when and where they’re scheduled, the relevant audience age groups, and additional information such as webpage and image links.
  resources:
    # resource name
    tpl-events-feed:
      format: json
      url: https://opendatasstg.blob.core.windows.net/events-feed/tpl-events-feed.json?sp=r&st=2023-06-19T19:56:33Z&se=2031-01-01T04:59:59Z&spr=https&sv=2022-11-02&sr=b&sig=rpZYPwSIa4zXJIt45WztzvkJZL%2BnF3YIAIuZ%2Bq%2Fl2uI%3D
      custom_reader: library_branch_programs_and_events_feed
      attributes:
        - id: EventID
          type: text
          info:
            notes: Event Unique ID
        - id: Title
          type: text
          info:
            notes: The name of the event
        - id: StartTime
          type: timestamp
          format: "%Y-%m-%dT%H:%M:%S.%fZ"
          info:
            notes: Start date and time of event
        - id: EndTime
          type: timestamp
          format: "%Y-%m-%dT%H:%M:%S.%fZ"
          info:
            notes: End date and time of event
        - id: StartDateLocal
          type: date
          format: "%Y-%m-%d"
          info:
            notes: Start date of the event
        - id: LocationName
          type: text
          info:
            notes: The name of the location of the event
        - id: Audiences
          type: text
          info:
            notes: Audiences intended for the event
        - id: Languages
          type: text
          info:
            notes: Languages the event will be made accessible for
        - id: EventTypes
          type: text
          info:
            notes: Categories this event falls into
        - id: IsRecurring
          type: text
          info:
            notes: Whether this event will be repeated
        - id: IsFull
          type: text
          info:
            notes: Whether the event is full
        - id: RegistrationClosed
          type: text
          info:
            notes: Whether the event's registration is closed
        - id: Status
          type: text
          info:
            notes: The status of the event
        - id: RegistrationIsFull
          type: text
          info:
            notes: Whether registration for the event is full
        - id: FeaturedImageUrl
          type: text
          info:
            notes: URL of the image associated with the event
        - id: LastUpdatedOn
          type: timestamp
          format: "%Y-%m-%dT%H:%M:%S.%fZ"
          info:
            notes: Date this event record was last updated
     