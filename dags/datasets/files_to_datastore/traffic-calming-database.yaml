    - name: speed bumps
      vocabulary_id: null

  information_url: null
  excerpt: Vision Zero Project Unit uses this data to track and to visualize the location of traffic calming measurements such as traffic islands, speed cushion and speed humps.
  limitations: null
  notes: |
    The Vision Zero Project Unit within Transportation Services maintains a database that tracks existing locations with installed traffic calming measures. These measures are traffic islands, speed cushions and speed humps. The descriptions of these traffic calming measures can be found [here](https://www.toronto.ca/services-payments/streets-parking-transportation/traffic-management/traffic-calming/).

    Our traffic calming database refreshes at the end of each week to ensure the latest updates are available for public access and review.

    The Vision Zero Projects Unit also maintains a spatial version of this dataset, which is also displayed on the public [Vision Zero mapping tool](https://www.toronto.ca/services-payments/streets-parking-transportation/road-safety/vision-zero/safety-measures-and-mapping/). This spatial data is maintained and updated on a separate schedule.

    
  resources:
    # resource name
    Traffic Calming Database:
      jsonpath: $.value
      format: json
      url: https://opendata.toronto.ca/transportation.services/traffic-calming-database/response.json
      attributes:
        - id: streetName
          type: text
          info:
            notes: Roadway name of installation
        - id: streetNameId
          type: text
          info:
            notes: This can be connected to the Toronto Centreline dataset (https://open.toronto.ca/dataset/toronto-centreline-tcl/) LINEAR_NAME_ID field
        - id: district
          type: text
          info:
            notes: District area within city
        - id: ward
          type: text
          info:
            notes: City ward number
        - id: initialInstallationDate
          type: text
          info:
            notes: Initial installation date
        - id: intersection1
          type: text
          info:
            notes: First intersection where installation begins or ends along the main roadway.
        - id: intersection1Id
          type: text
          info:
            notes: This can be connected to the Toronto Centreline dataset (https://open.toronto.ca/dataset/toronto-centreline-tcl/) INTERSECTION_ID fields
        - id: intersection2
          type: text
          info:
            notes: Second intersection where installation begins or ends along the main roadway.
        - id: intersection2Id
          type: text
          info:
            notes: This can be connected to the Toronto Centreline dataset (https://open.toronto.ca/dataset/toronto-centreline-tcl/) INTERSECTION_ID fields
        - id: numIslands
          type: text
          info:
            notes: Number of traffic islands
        - id: numSpeedBumps
          type: text
          info:
            notes: Number of speed bumps
        - id: numSpeedCushions
          type: text
          info:
            notes: Number of speed cushions
        - id: numSpeedHumps
          type: text
          info:
            notes: Number of speed humps
        - id: roadType
          type: text
          info:
            notes: Roadway Classification
        - id: status
          type: text
          info:
            notes: Status of traffic calming installation        
        
        