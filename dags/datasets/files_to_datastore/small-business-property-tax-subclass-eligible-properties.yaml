  notes: 'On November 9, 2021, City Council approved a 15 per cent reduction in the
    tax rate for small businesses who meet the eligibility criteria for the new small
    business property tax subclass. This dataset includes all eligible properties
    in the small business property tax subclass from 2022 and beyond. The list of
    properties was determined in accordance with City of Toronto By-law 924-2021. '
