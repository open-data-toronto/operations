  resources:
    # resource name
    Residential Health Inspections:
      format: json
      url: https://secure.toronto.ca/opendata/eh/properties/v1?format=json
      custom_reader: residential_health_hazards
      custom_headers:
        SRV-KEY: healthhazards_secure_toronto_opendata_SRV_KEY
        USER-KEY: secure_toronto_opendata_USER_KEY
      datastore_upsert:
        primary_key: "unique_id"
      attributes:
        - id: unique_id
          type: text
          info:
            notes: "Unique id for this record, used for internal technical purposes"
        - id: case_id
          type: text
          info:
            notes: "Unique id for this case"
        - id: case_type
          type: text
          info:
            notes: "Type of case"
        - id: address
          type: text
          info:
            notes: "Address related to the record"
        - id: geo_id
          type: text
          info:
            notes: "Unique identifier for the address"        
        - id: investigation_type
          type: text
          info:
            notes: "Investigation category for record."
        - id: investigation_date
          type: date
          format: "%Y-%m-%d"
          info:
            notes: "Start date of investigation."
        - id: last_updated_date
          type: date
          format: "%Y-%m-%d"
          info:
            notes: "Date of most recent investigation update."
        - id: info_code
          type: text
          info:
            notes: "Investigation Sub-Category code."
        - id: hazard_type
          type: text
          info:
            notes: "Investigation Sub-Category."
        - id: violation
          type: text
          info:
            notes: "Type of complaint under investigation."
        - id: status_desc
          type: text
          info:
            notes: "Status if the investigation."
        - id: file_extract_date
          type: date
          format: "%Y-%m-%d"
          info:
            notes: "Date of file extract."
        - id: geometry
          type: text
          info:
            notes: ""
        