  limitations: This dataset will not store historic statuses of speed reductions, nor trace when statuses changed.
  notes: |
    The City of Toronto is currently reducing speed limits to curb speeding on  roads. This is part of a holistic Speed Management Strategy as outlined in the City’s [Vision Zero Road Safety Plan](https://www.toronto.ca/services-payments/streets-parking-transportation/road-safety/vision-zero/).
    
    This dataset shows, for each ward, the status of speed limits being reduced to 30 km/h on local roads and laneways
    
